# Test logging configuration
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = STDOUT

# Console Appender
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Connector-specific loggers
logger.dwssink.name = org.apache.flink.cdc.connectors.dws
logger.dwssink.level = INFO
logger.dwssink.additivity = false
logger.dwssink.appenderRef.console.ref = STDOUT

logger.dws.name = com.huaweicloud.dws
logger.dws.level = INFO
logger.dws.additivity = false
logger.dws.appenderRef.console.ref = STDOUT

# Flink CDC
logger.flinkcdc.name = org.apache.flink.cdc
logger.flinkcdc.level = INFO
logger.flinkcdc.additivity = false
logger.flinkcdc.appenderRef.console.ref = STDOUT

# JDBC-related logger
logger.sql.name = org.apache.flink.connector.jdbc
logger.sql.level = INFO
logger.sql.additivity = false
logger.sql.appenderRef.console.ref = STDOUT
