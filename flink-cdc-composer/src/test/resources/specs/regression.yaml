- do: FLINK-39682 (Invoke TO_DATE with TIMESTAMP)
  time-zone: Asia/Tokyo
  projection: |-
    id_
    timestamp_0_
    TO_DATE(timestamp_0_) AS comp_1
    TIMESTAMPADD(HOUR, 18, timestamp_0_) AS comp_2
    TO_DATE(TIMESTAMPADD(HOUR, 18, timestamp_0_)) AS comp_3
    timestamp_6_
    TO_DATE(timestamp_6_) AS comp_4
    TIMESTAMPADD(HOUR, 18, timestamp_6_) AS comp_5
    TO_DATE(TIMESTAMPADD(HOUR, 18, timestamp_6_)) AS comp_6
    timestamp_9_
    TO_DATE(timestamp_9_) AS comp_7
    TIMESTAMPADD(HOUR, 18, timestamp_9_) AS comp_8
    TO_DATE(TIMESTAMPADD(HOUR, 18, timestamp_9_)) AS comp_9
  filter: id_ > 0
  primary-key: id_
  # timestamp_0_ is: 1970-01-02 10:17:36, TO_DATE should yield 1970-01-02
  # after +18 hours: 1970-01-03 04:17:36, TO_DATE should yield 1970-01-03
  #
  # timestamp_6_ is: 1970-01-03 17:09:27, TO_DATE should yield 1970-01-03
  # after +18 hours: 1970-01-04 11:09:27, TO_DATE should yield 1970-01-04
  #
  # timestamp_9_ is: 1970-01-05 00:01:18, TO_DATE should yield 1970-01-05
  # after +18 hours: 1970-01-05 18:01:18, TO_DATE should yield 1970-01-05
  #
  # None of them are affected by pipeline time-zone config.
  expect: |-
    CreateTableEvent{tableId=foo.bar.baz, schema=columns={`id_` BIGINT NOT NULL 'Identifier',`timestamp_0_` TIMESTAMP(0),`comp_1` DATE,`comp_2` TIMESTAMP(0),`comp_3` DATE,`timestamp_6_` TIMESTAMP(6),`comp_4` DATE,`comp_5` TIMESTAMP(3),`comp_6` DATE,`timestamp_9_` TIMESTAMP(9),`comp_7` DATE,`comp_8` TIMESTAMP(3),`comp_9` DATE}, primaryKeys=id_, options=()}
    DataChangeEvent{tableId=foo.bar.baz, before=[], after=[1, 1970-01-02T10:17:36.789123456, 1970-01-02, 1970-01-03T04:17:36.789, 1970-01-03, 1970-01-03T17:09:27.891234561, 1970-01-03, 1970-01-04T11:09:27.891, 1970-01-04, 1970-01-05T00:01:18.912345612, 1970-01-05, 1970-01-05T18:01:18.912, 1970-01-05], op=INSERT, meta=()}
    DataChangeEvent{tableId=foo.bar.baz, before=[1, 1970-01-02T10:17:36.789123456, 1970-01-02, 1970-01-03T04:17:36.789, 1970-01-03, 1970-01-03T17:09:27.891234561, 1970-01-03, 1970-01-04T11:09:27.891, 1970-01-04, 1970-01-05T00:01:18.912345612, 1970-01-05, 1970-01-05T18:01:18.912, 1970-01-05], after=[], op=DELETE, meta=()}

